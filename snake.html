<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #141414;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            touch-action: none;
        }
        #gameContainer {
            position: relative;
        }
        canvas {
            border: 3px solid #666;
            background: #141414;
            display: block;
            box-shadow: 0 0 10px rgba(255,255,255,0.1);
            max-width: 95vw;
            max-height: 55vh;
        }
        #info {
            color: #fff;
            font-size: 16px;
            margin-bottom: 10px;
            display: flex;
            gap: 20px;
        }
        #info span {
            color: #888;
        }
        #info strong {
            color: #fff;
        }
        #layoutToggle {
            margin-bottom: 8px;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        #layoutToggle label {
            color: #888;
            font-size: 13px;
        }
        #layoutToggle button {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            padding: 4px 12px;
            cursor: pointer;
        }
        #layoutToggle button.active {
            background: rgba(0,200,0,0.3);
            border-color: #00c800;
        }
        #controls {
            margin-top: 10px;
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 5px;
            justify-content: center;
        }
        .btn {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.1s;
        }
        .btn:active {
            background: rgba(255,255,255,0.3);
        }
        .btn-empty {
            visibility: hidden;
        }
        #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        #gameOver h1 {
            color: #ff5050;
            font-size: 48px;
            margin-bottom: 20px;
        }
        #gameOver p {
            font-size: 24px;
            margin-bottom: 10px;
        }
        #gameOver .hint {
            font-size: 16px;
            color: #888;
            margin-top: 20px;
        }
        @media (min-width: 700px) {
            #controls {
                display: none;
            }
            #layoutToggle {
                display: none;
            }
            canvas {
                max-width: none;
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div id="info">
        <div>Score: <strong id="score">0</strong></div>
        <div>High: <strong id="highScore">0</strong></div>
        <div>Speed: <strong id="speed">8</strong></div>
    </div>
    <div id="layoutToggle">
        <label>Layout:</label>
        <button id="btnLandscape" class="active">Landscape</button>
        <button id="btnPortrait">Portrait</button>
    </div>
    <div id="gameContainer">
        <canvas id="game" width="640" height="480"></canvas>
        <div id="gameOver">
            <h1>GAME OVER</h1>
            <p>Score: <span id="finalScore">0</span></p>
            <p class="hint">Press SPACE or tap to restart</p>
        </div>
    </div>
    <div id="controls">
        <div class="btn btn-empty"></div>
        <div class="btn" data-dir="up">&#9650;</div>
        <div class="btn btn-empty"></div>
        <div class="btn" data-dir="left">&#9664;</div>
        <div class="btn btn-empty"></div>
        <div class="btn" data-dir="right">&#9654;</div>
        <div class="btn btn-empty"></div>
        <div class="btn" data-dir="down">&#9660;</div>
        <div class="btn btn-empty"></div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const speedEl = document.getElementById('speed');
        const gameOverScreen = document.getElementById('gameOver');
        const finalScoreEl = document.getElementById('finalScore');
        const btnLandscape = document.getElementById('btnLandscape');
        const btnPortrait = document.getElementById('btnPortrait');

        const GRID_SIZE = 20;
        let COLS = 32;
        let ROWS = 24;

        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = {};
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
        let speed = 8;
        let gameOver = false;
        let lastTime = 0;
        let accumulator = 0;

        highScoreEl.textContent = highScore;

        function setLayout(landscape) {
            if (landscape) {
                COLS = 32;
                ROWS = 24;
                canvas.width = 640;
                canvas.height = 480;
                btnLandscape.classList.add('active');
                btnPortrait.classList.remove('active');
            } else {
                COLS = 20;
                ROWS = 30;
                canvas.width = 400;
                canvas.height = 600;
                btnPortrait.classList.add('active');
                btnLandscape.classList.remove('active');
            }
            resetGame();
        }

        btnLandscape.addEventListener('click', () => setLayout(true));
        btnPortrait.addEventListener('click', () => setLayout(false));

        function resetGame() {
            const startX = Math.floor(COLS / 2);
            const startY = Math.floor(ROWS / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX - 1, y: startY },
                { x: startX - 2, y: startY }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = 8;
            gameOver = false;
            scoreEl.textContent = score;
            speedEl.textContent = speed;
            gameOverScreen.style.display = 'none';
            placeFood();
        }

        function placeFood() {
            const emptyCells = [];
            for (let x = 0; x < COLS; x++) {
                for (let y = 0; y < ROWS; y++) {
                    if (!snake.some(s => s.x === x && s.y === y)) {
                        emptyCells.push({ x, y });
                    }
                }
            }
            if (emptyCells.length === 0) {
                gameOver = true;
                return;
            }
            const idx = Math.floor(Math.random() * emptyCells.length);
            food = emptyCells[idx];
        }

        function changeDirection(dx, dy) {
            if (gameOver) return;
            if (dx !== -direction.x || dy !== -direction.y) {
                nextDirection = { x: dx, y: dy };
            }
        }

        function update() {
            if (gameOver) return;

            direction = { ...nextDirection };
            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
                endGame();
                return;
            }

            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                speed = Math.min(8 + Math.floor(score / 50), 25);
                scoreEl.textContent = score;
                speedEl.textContent = speed;
                placeFood();
            } else {
                snake.pop();
            }
        }

        function endGame() {
            gameOver = true;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }
            finalScoreEl.textContent = score;
            gameOverScreen.style.display = 'flex';
        }

        function draw() {
            ctx.fillStyle = '#141414';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#282828';
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= canvas.width; x += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= canvas.height; y += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }

            ctx.fillStyle = '#c83232';
            ctx.fillRect(food.x * GRID_SIZE, food.y * GRID_SIZE, GRID_SIZE - 1, GRID_SIZE - 1);
            ctx.fillStyle = '#ff9696';
            ctx.fillRect(food.x * GRID_SIZE + GRID_SIZE/4, food.y * GRID_SIZE + GRID_SIZE/4, GRID_SIZE/4, GRID_SIZE/4);

            snake.forEach((segment, i) => {
                if (i === 0) {
                    ctx.fillStyle = '#00c800';
                } else {
                    ctx.fillStyle = '#009600';
                }
                ctx.fillRect(segment.x * GRID_SIZE, segment.y * GRID_SIZE, GRID_SIZE - 1, GRID_SIZE - 1);

                if (i === 0) {
                    const cx = segment.x * GRID_SIZE + GRID_SIZE / 2;
                    const cy = segment.y * GRID_SIZE + GRID_SIZE / 2;
                    const offset = GRID_SIZE / 4;
                    const eyeSize = GRID_SIZE / 6;
                    let eyes;
                    if (direction.x === 1) {
                        eyes = [[cx + offset, cy - offset/2], [cx + offset, cy + offset/2]];
                    } else if (direction.x === -1) {
                        eyes = [[cx - offset, cy - offset/2], [cx - offset, cy + offset/2]];
                    } else if (direction.y === 1) {
                        eyes = [[cx - offset/2, cy + offset], [cx + offset/2, cy + offset]];
                    } else {
                        eyes = [[cx - offset/2, cy - offset], [cx + offset/2, cy - offset]];
                    }
                    eyes.forEach(([ex, ey]) => {
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(ex, ey, eyeSize, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#000';
                        ctx.beginPath();
                        ctx.arc(ex, ey, eyeSize/2, 0, Math.PI * 2);
                        ctx.fill();
                    });
                }
            });
        }

        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const delta = timestamp - lastTime;
            lastTime = timestamp;
            accumulator += delta;

            const interval = 1000 / speed;
            while (accumulator >= interval) {
                update();
                accumulator -= interval;
            }

            draw();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' && gameOver) {
                e.preventDefault();
                resetGame();
                return;
            }
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W':
                    e.preventDefault();
                    changeDirection(0, -1);
                    break;
                case 'ArrowDown': case 's': case 'S':
                    e.preventDefault();
                    changeDirection(0, 1);
                    break;
                case 'ArrowLeft': case 'a': case 'A':
                    e.preventDefault();
                    changeDirection(-1, 0);
                    break;
                case 'ArrowRight': case 'd': case 'D':
                    e.preventDefault();
                    changeDirection(1, 0);
                    break;
            }
        });

        document.querySelectorAll('.btn[data-dir]').forEach(btn => {
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                const dir = btn.dataset.dir;
                if (dir === 'up') changeDirection(0, -1);
                else if (dir === 'down') changeDirection(0, 1);
                else if (dir === 'left') changeDirection(-1, 0);
                else if (dir === 'right') changeDirection(1, 0);
            });
            btn.addEventListener('click', (e) => {
                const dir = btn.dataset.dir;
                if (dir === 'up') changeDirection(0, -1);
                else if (dir === 'down') changeDirection(0, 1);
                else if (dir === 'left') changeDirection(-1, 0);
                else if (dir === 'right') changeDirection(1, 0);
            });
        });

        gameOverScreen.addEventListener('click', () => {
            if (gameOver) resetGame();
        });
        gameOverScreen.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameOver) resetGame();
        });

        let touchStartX = 0;
        let touchStartY = 0;
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });
        canvas.addEventListener('touchend', (e) => {
            if (gameOver) {
                resetGame();
                return;
            }
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);
            if (Math.max(absDx, absDy) < 20) return;
            if (absDx > absDy) {
                changeDirection(dx > 0 ? 1 : -1, 0);
            } else {
                changeDirection(0, dy > 0 ? 1 : -1);
            }
        }, { passive: true });

        resetGame();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
